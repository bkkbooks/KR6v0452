body:
  text: 朝鮮道峰沙門有聞科註朝鮮影波和尚聖奎證正將解此偈大分為五初總相法體二初標擧大位法性圓融無二相法乃事法界性謂理法界圓無際涯竪窮則三世無間斷時橫徧則十方無空缺處融通為理事無礙事事無礙冥合一相此為宗本總相法體二開合釋成二初別開收揀顯動靜不一從一心生萬法則無不皆從法界流於中二初明泯相門全揀諸法不動本來寂無名無相絕一切開總成別攝事歸理唯是全揀生佛之名染淨之相蕭然空寂泯絕無寄也證智所知非餘境一亘青空文殊智體證者唯證非因者之境也牧牛子曰非但全揀門極致證智所知全收門極致亦證智所知盖言揀言收為門不同而極致乃擧一專合證者何但證一門之偏也文殊智體普賢行用融合則毘盧遮那全身為二門之極致也自初法性句終至理事冥然句中間轍跡無非智行兩全收揀交徹四法界無障礙之不思議則此謂總相法體法性大位之言實非妄也二顯緣起門全收二初理事無礙真性甚深極微妙不守自性隨緣成依理成事理隨事變為事事無礙之所由二事事無礙先明其因此顯其宗於中四初處無礙無邊剎境自他不隔於毫端一中一切多中一有力無力相入義一多相容不同門一即一切多即一有體無體相即義諸法相即自在門此上二句約一事多事互相入即以顯無礙一微塵中含十方約大事小事互相入即顯無礙廣狹自在無礙門一切塵中亦如是擧一例諸約一切塵塵同時互相入即以顯無礙如海滴滴具含十德同時具足相應門二時無礙十世古今始終不離於當念無量遠劫即一念一念即是無量劫念劫無礙九世十世互相即三世各具三世九世也現在一念為第十世也圓融十世皆具一念中故互相即仍不雜亂隔別成行布門十世宛然故隔別成十世隔法異成門三因果無礙初發心時便正覺發心畢竟竟無二致始終一貫四染淨無礙生死涅槃常共和真妄交徹凡聖無二緣起大用一周於此千波競起普賢行海則此謂全收門極致也二會上收揀顯動靜不二會萬法歸一心則無不還歸此法界於中二初正明一味理事冥然無分別總相法體末後圓成蓋法性無二相從本起末之大位理事無分別攝末歸本之大位言雖前後融會一味則法乃同時也以義相之宗眼華嚴無障礙法華之一佛乘祖演於此偈遂使未學開示於眼目悟入於骨髓圓證法界雖看盡三藏究竟所得不過如是叢林終不掛懷傷哉孤負二境超權小十佛普賢大人境法界大位冲深包博總該萬有周徧含容百千世界頭頭物物元我一心顯量握土成金攬草成藥觸境逢緣任運合道日用運為無非佛事擲大千於方外納須彌於芥中吾輩之常分非假於神術此不思議大解脫非大人受用之家事乎請着高眼右祖述法性上來總相法體竟二教主開化二初示見道法能仁海印三昧中飜出如意不思議依定說教也釋迦此云寂默即照而寂收化歸證自利之體也牟尼此云能仁即寂而照從證起化利他之用也則既在化門他受用報身故獨擧能仁也華嚴專依海印三昧說於一味法界融通無礙法性之理令諸眾生得見自己法身故云飜出如意見道之法也釋迦此云能仁非寂默牟尼此云寂默非能仁也科註主誤解故今証正之二示行證法雨寶益生滿虛空化徧十方也雨寶謂三千威儀八萬細行無盡之寶普雨於微塵剎土令諸眾生得修行證真之益也右能開示法性三所化機益二初總列解行證眾生隨器得利益是故行者還本際三聚五性隨量飲海各得其飽也得利益見道也行者修道也還本際證果也二反勸息妄行叵息妄想必不得謂揀邪絕益而反勸行得也右所悟入法性四牒結上義從來道結重明悟修證於中三初結上所被機益別明見道無緣善巧捉如意歸家隨分得資糧無緣謂無愛憎之緣善巧謂契理合機平等之說捉如意謂見道得資糧謂資糧位文雖前却若以回文順意則得資糧捉如意牒上能化飜出如意不思議之文結成所化得益之義以明見道位則應於本教中信解分也闕以陀羅尼無盡寶莊嚴法界實寶殿寫本此二句與科註並闕闕三結上總相法體別明圓證窮坐實際中道床窮謂究竟五位則斷行智證及位究竟也坐謂入證義實際中道床謂圓融無礙一味法界牒前總相法體之位結成究竟圓證還本際之義則應於本教中成德分也此乃事智成佛拔亂反正太平正是將軍力則如來出現之本意能事之手段也五拂新就本舊來不動名為佛不許將軍致太平則義相祖師本分之家風也右自己法性如上所陳雖是凡識上所解皆有典據幸勿以人卑而謗之虛己求宗則絕陳者猶有一指之味矣蓮潭和尚論辨此偈愚亦曾見而泛然看過故今雖見高判未能輒解且衰老已甚前解漸盡何能妄加論辨乎然此偈古今無解釋者而今以大手分科細釋不具看經眼能緣乎諸方所見未知如何而愚意以此流布未有不可也又古人廬山詩云橫看成嶺側看峰到處看山了不同看經亦爾雖所見不同各得一意所謂白璧黃金各為至寶彼自彼我自我何必拘礙於不同彼耶但愚意大段分三初二同前第三所化機益分二初句總明隨機各益二是故下別明悟修證於中初三句明悟歸家下三句明修後二句明證初悟中初句標悟叵息句反顯妄想不得悟無緣句順明善巧可以悟得飜出如意珠從如意珠雨虛空益生之寶明修中歸家牒前悟修分得資糧正明修修有差別故云隨分而修是為成佛之資糧以多羅尼無盡寶者上能化中雨滿虛空者總持無盡寶以此寶莊嚴法界悉成寶殿正是修後二句明證中窮極也坐證也極證中道實際之理初發心住圓融成佛所謂煩惱斷盡福智成竟住初圓融成佛後入行布門三賢十聖次第修證成究竟妙覺果故此圓融成佛為舊來本成佛而非究竟圓證也述愚左見如是高判五科非謂不是也則各主張無妨法性偈寫本一卷桐華寺講堂金晶恒秘藏本會借寫也法性偈寫本一卷
